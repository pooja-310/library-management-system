{% extends 'base.html' %}

{% block content %}
<h2>Books List</h2>
<table border="1">
<tr>
    <th>ID</th>
    <th>Title</th>
    <th>Author</th>
    <th>Year</th>
    <th>Action</th>
</tr>
{% for book in books %}
<tr>
    <td>{{ book.id }}</td>
    <td>{{ book.title }}</td>
    <td>{{ book.author }}</td>
    <td>{{ book.year }}</td>
    <td><a href="/delete_book/{{ book.id }}">Delete</a></td>
</tr>
{% endfor %}
</table>
{% endblock %}
