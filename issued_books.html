{% extends 'base.html' %}

{% block content %}
<h2>Issued Books</h2>
<table border="1">
<tr>
    <th>ID</th>
    <th>Book Title</th>
    <th>Issued To</th>
    <th>Action</th>
</tr>
{% for i in issued %}
<tr>
    <td>{{ i.id }}</td>
    <td>{{ i.title }}</td>
    <td>{{ i.issued_to }}</td>
    <td><a href="/return_book/{{ i.id }}">Return</a></td>
</tr>
{% endfor %}
</table>
{% endblock %}
